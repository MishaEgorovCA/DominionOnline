# Example site block — TLS certificates and paths are site-specific.
server {
    listen 443 ssl http2;
    server_name dominion.example.com;

    ssl_certificate     /etc/letsencrypt/live/dominion.example.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/dominion.example.com/privkey.pem;

    location / {
        proxy_pass http://127.0.0.1:3333;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /ws {
        proxy_pass http://127.0.0.1:3333;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_read_timeout 7d;
    }
}
